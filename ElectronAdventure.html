<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自由电子冒险</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        /* 横屏强制 */
        @media screen and (orientation: portrait) {
            body {
                transform: rotate(-90deg);
                transform-origin: left top;
                width: 100vh;
                height: 100vw;
                overflow-x: hidden;
                position: absolute;
                top: 100%;
                left: 0;
            }
        }
        
        #gameContainer {
            width: 1000px;
            max-width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        #gameArea {
            position: relative;
            width: 800px;
            height: 600px;
            margin: 0 auto;
            background: #1a1a1a;
            border: 3px solid #4CAF50;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.3);
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* 菜单界面 */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
            backdrop-filter: blur(5px);
        }
        
        #menu h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #4CAF50;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px #4CAF50; }
            50% { text-shadow: 0 0 40px #4CAF50, 0 0 60px #4CAF50; }
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 18px;
        }
        
        #usernameInput {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            width: 300px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 2px solid #4CAF50;
        }
        
        #usernameInput:focus {
            outline: none;
            box-shadow: 0 0 20px #4CAF50;
        }
        
        #menu button {
            padding: 15px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 10px;
            min-width: 200px;
            font-weight: bold;
        }
        
        #menu button:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 30px #4CAF50;
        }
        
        #menu button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #menu button.secondary {
            background: #666;
        }
        
        #status {
            font-size: 20px;
            margin: 20px 0;
            color: #ffaa00;
            min-height: 30px;
        }
        
        /* 排行榜 */
        #ranking {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px;
            border-radius: 10px;
            width: 220px;
            border: 1px solid #4CAF50;
            z-index: 50;
            backdrop-filter: blur(5px);
        }
        
        #ranking h3 {
            margin: 0 0 10px 0;
            color: #4CAF50;
            text-align: center;
            font-size: 18px;
        }
        
        #rankingList {
            margin: 0;
            padding-left: 25px;
            font-size: 14px;
        }
        
        #rankingList li {
            margin: 5px 0;
            color: #ddd;
        }
        
        /* 游戏控制 */
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 200;
        }
        
        .control-panel {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #4CAF50;
        }
        
        #joystick {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border-radius: 60px;
            pointer-events: auto;
            border: 2px solid #4CAF50;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #4CAF50;
            font-size: 14px;
            text-align: center;
        }
        
        #joystick .arrows {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        #actionButtons {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        
        .action-btn {
            width: 100px;
            height: 100px;
            border-radius: 50px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            border: 2px solid white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .action-btn:active {
            transform: scale(0.9);
        }
        
        .action-btn .emoji {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        #shootBtn {
            background: #ff4444;
            color: white;
            box-shadow: 0 0 20px #ff4444;
        }
        
        #skillBtn {
            background: #4444ff;
            color: white;
            box-shadow: 0 0 20px #4444ff;
        }
        
        /* 游戏信息 */
        #gameInfo {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 16px;
            z-index: 50;
            pointer-events: none;
        }
        
        .info-panel {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #4CAF50;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        #gameTime {
            font-size: 24px;
            font-weight: bold;
            color: #4CAF50;
        }
        
        #cooldown {
            color: #ffaa00;
        }
        
        #matchInfo {
            color: #fff;
        }
        
        /* 确认界面 */
        #confirmOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 200;
            backdrop-filter: blur(5px);
        }
        
        #confirmOverlay h2 {
            font-size: 36px;
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        #confirmCountdown {
            font-size: 48px;
            margin: 20px;
            color: #ffaa00;
        }
        
        #confirmOverlay button {
            padding: 15px 40px;
            font-size: 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
    
    <!-- 导入Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="gameContainer">
        <div id="gameArea">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            
            <!-- 排行榜 -->
            <div id="ranking">
                <h3>🏆 排行榜</h3>
                <ol id="rankingList">
                    <li>加载中...</li>
                </ol>
            </div>
            
            <!-- 游戏信息 -->
            <div id="gameInfo">
                <div class="info-panel" id="matchInfo">
                    等待匹配...
                </div>
                <div class="info-panel" id="cooldown">
                    大招就绪
                </div>
                <div class="info-panel" id="gameTime">
                    2:00
                </div>
            </div>
            
            <!-- 控制按钮 (游戏开始时显示) -->
            <div id="controls" style="display: none;">
                <div class="control-panel" id="joystick">
                    <div class="arrows">⬆️ ⬇️ ⬅️ ➡️</div>
                    <div>WASD 移动</div>
                </div>
                <div id="actionButtons">
                    <button class="action-btn" id="shootBtn">
                        <span class="emoji">⚡</span>
                        攻击
                    </button>
                    <button class="action-btn" id="skillBtn">
                        <span class="emoji">✨</span>
                        大招
                    </button>
                </div>
            </div>
            
            <!-- 主菜单 -->
            <div id="menu">
                <h1>自由电子冒险</h1>
                <div class="subtitle">⚡质子 VS 电子✨</div>
                
                <input type="text" id="usernameInput" placeholder="输入你的昵称" value="玩家" maxlength="20">
                
                <button id="matchBtn">开始匹配</button>
                <button id="testBtn" class="secondary">测试模式 (单机)</button>
                
                <div id="status"></div>
            </div>
            
            <!-- 确认界面 -->
            <div id="confirmOverlay">
                <h2>⚔️ 匹配成功 ⚔️</h2>
                <div id="confirmInfo">等待对方确认...</div>
                <div id="confirmCountdown">5</div>
                <button id="confirmBtn">确认</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, getOrCreatePlayer, getRanking, updatePlayerStats, saveGameRecord } from './js/supabase.js'
        import { MatchSystem } from './js/match.js'
        import { Game } from './js/game.js'

        // 游戏状态
        let currentPlayer = null
        let matchSystem = null
        let currentGame = null
        let testMode = false

        // 更新排行榜
        async function updateRanking() {
            try {
                const ranking = await getRanking()
                const list = document.getElementById('rankingList')
                if (ranking && ranking.length > 0) {
                    list.innerHTML = ranking.map((p, i) => 
                        `<li>${i+1}. ${p.username} - ${p.score}分 (${p.wins}胜/${p.losses}负)</li>`
                    ).join('')
                } else {
                    list.innerHTML = '<li>暂无数据</li>'
                }
            } catch (error) {
                console.error('更新排行榜失败:', error)
            }
        }

        // 初始化玩家
        async function initPlayer() {
            const usernameInput = document.getElementById('usernameInput')
            let username = usernameInput.value.trim()
            
            if (!username) {
                username = '玩家' + Math.floor(Math.random() * 1000)
                usernameInput.value = username
            }
            
            try {
                currentPlayer = await getOrCreatePlayer(username)
                document.getElementById('status').textContent = `欢迎, ${username}!`
                return true
            } catch (error) {
                console.error('初始化玩家失败:', error)
                document.getElementById('status').textContent = '连接服务器失败'
                return false
            }
        }

        // 开始匹配
        document.getElementById('matchBtn').addEventListener('click', async () => {
            if (!await initPlayer()) return
            
            testMode = false
            document.getElementById('menu').style.display = 'none'
            document.getElementById('status').textContent = '正在匹配中...'
            
            matchSystem = new MatchSystem(currentPlayer.id, (match) => {
                showConfirmDialog(match)
            })
            
            await matchSystem.joinQueue()
        })

        // 测试模式
        document.getElementById('testBtn').addEventListener('click', async () => {
            testMode = true
            currentPlayer = { id: 'test-' + Date.now(), username: '测试玩家' }
            document.getElementById('menu').style.display = 'none'
            
            // 创建测试对战
            startTestGame()
        })

        // 显示确认界面
        function showConfirmDialog(match) {
            const overlay = document.getElementById('confirmOverlay')
            const info = document.getElementById('confirmInfo')
            const countdown = document.getElementById('confirmCountdown')
            const confirmBtn = document.getElementById('confirmBtn')
            
            let role = match.protonId === currentPlayer.id ? '质子' : '电子'
            info.textContent = `你扮演: ${role} | 等待对方确认...`
            overlay.style.display = 'flex'
            
            let timeLeft = 5
            countdown.textContent = timeLeft
            
            const timer = setInterval(() => {
                timeLeft--
                countdown.textContent = timeLeft
                if (timeLeft <= 0) {
                    clearInterval(timer)
                    overlay.style.display = 'none'
                    document.getElementById('menu').style.display = 'flex'
                    document.getElementById('status').textContent = '匹配超时'
                }
            }, 1000)
            
            confirmBtn.onclick = () => {
                clearInterval(timer)
                overlay.style.display = 'none'
                startGame(match)
            }
        }

        // 开始游戏
        function startGame(match) {
            document.getElementById('controls').style.display = 'flex'
            
            const canvas = document.getElementById('gameCanvas')
            const role = match.protonId === currentPlayer.id ? 'proton' : 'electron'
            
            currentGame = new Game(
                canvas,
                currentPlayer.id,
                role,
                role === 'proton' ? match.electronId : match.protonId,
                (result) => gameOver(result, match)
            )
            
            currentGame.start()
            setupControls()
        }

        // 测试模式开始游戏
        function startTestGame() {
            document.getElementById('controls').style.display = 'flex'
            
            const canvas = document.getElementById('gameCanvas')
            const role = Math.random() < 0.5 ? 'proton' : 'electron'
            
            currentGame = new Game(
                canvas,
                currentPlayer.id,
                role,
                'bot',
                (result) => {
                    alert(`游戏结束: ${result === 'win' ? '胜利!' : result === 'draw' ? '平局' : '失败'}`)
                    document.getElementById('menu').style.display = 'flex'
                    document.getElementById('controls').style.display = 'none'
                }
            )
            
            currentGame.start()
            setupControls()
        }

        // 游戏结束
        async function gameOver(result, match) {
            if (!testMode && currentPlayer) {
                try {
                    // 保存游戏记录
                    const winner = result === 'win' ? currentPlayer.id : 
                                  result === 'loss' ? (match.protonId === currentPlayer.id ? match.electronId : match.protonId) : 
                                  null
                    
                    await saveGameRecord(
                        match.protonId,
                        match.electronId,
                        winner,
                        120 - Math.floor(currentGame.gameTime)
                    )
                    
                    // 更新玩家积分
                    await updatePlayerStats(currentPlayer.id, result)
                    await updatePlayerStats(
                        result === 'win' ? (match.protonId === currentPlayer.id ? match.electronId : match.protonId) : 
                        result === 'loss' ? currentPlayer.id : 
                        match.protonId,
                        result === 'win' ? 'loss' : result === 'loss' ? 'win' : 'draw'
                    )
                    
                    // 更新排行榜
                    await updateRanking()
                } catch (error) {
                    console.error('保存游戏记录失败:', error)
                }
            }
            
            // 显示结果
            let message = ''
            if (result === 'win') message = '🎉 胜利! +10分'
            else if (result === 'loss') message = '💔 失败 -5分'
            else message = '🤝 平局 -2分'
            
            alert(message)
            
            // 返回菜单
            document.getElementById('menu').style.display = 'flex'
            document.getElementById('controls').style.display = 'none'
            document.getElementById('status').textContent = message
        }

        // 设置控制
        function setupControls() {
            const keys = {}
            
            window.addEventListener('keydown', (e) => {
                if (!currentGame) return
                
                const key = e.key.toLowerCase()
                if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key)) {
                    e.preventDefault()
                }
                
                keys[e.key] = true
            })
            
            window.addEventListener('keyup', (e) => {
                keys[e.key] = false
            })
            
            // 移动循环
            setInterval(() => {
                if (!currentGame) return
                
                let dx = 0, dy = 0
                
                if (keys['w'] || keys['W'] || keys['ArrowUp']) dy = -1
                if (keys['s'] || keys['S'] || keys['ArrowDown']) dy = 1
                if (keys['a'] || keys['A'] || keys['ArrowLeft']) dx = -1
                if (keys['d'] || keys['D'] || keys['ArrowRight']) dx = 1
                
                if (dx !== 0 || dy !== 0) {
                    // 归一化对角线速度
                    if (dx !== 0 && dy !== 0) {
                        dx *= 0.707
                        dy *= 0.707
                    }
                    currentGame.movePlayer(dx, dy)
                }
            }, 16)
            
            // 攻击按钮
            document.getElementById('shootBtn').addEventListener('click', () => {
                if (!currentGame) return
                // 向鼠标方向射击，简化版：向当前移动方向
                const keys = window.keys || {}
                let dx = 0, dy = -1 // 默认向上
                
                if (keys['w'] || keys['ArrowUp']) dy = -1
                else if (keys['s'] || keys['ArrowDown']) dy = 1
                else if (keys['a'] || keys['ArrowLeft']) dx = -1
                else if (keys['d'] || keys['ArrowRight']) dx = 1
                
                currentGame.shoot({x: dx, y: dy})
            })
            
            // 大招按钮
            document.getElementById('skillBtn').addEventListener('click', () => {
                if (!currentGame) return
                currentGame.useUltimate()
            })
        }

        // 定期更新排行榜
        setInterval(updateRanking, 5000)
        
        // 初始加载排行榜
        updateRanking()
    </script>
</body>
</html>
